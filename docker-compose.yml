services:
  postgres:
    image: postgres:16
    container_name: abbot_study_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: abbot_study
      POSTGRES_USER: abbot_study
      POSTGRES_PASSWORD: abbot_study_password
      DJANGO_SETTINGS_MODULE: config.settings.docker
    ports:
      - "5433:5432"
    volumes:
      - abbot_study_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U abbot_study -d abbot_study"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: abbot_study_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: abbot_study_backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    command: python manage.py runserver 0.0.0.0:8000

  celery:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: abbot_study_celery
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    env_file:
      - .env.example
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.docker
    command: celery -A config worker --loglevel=info

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: abbot_study_frontend
    volumes:
      - ./frontend:/app
      - abbot_study_frontend_node_modules:/app/node_modules
      - abbot_study_frontend_next:/app/.next
    env_file:
      - .env.example
    working_dir: /app
    ports:
      - "3000:3000"
    command: npm run dev -- --hostname 0.0.0.0 --port 3000

volumes:
  abbot_study_postgres_data:
  abbot_study_frontend_node_modules:
  abbot_study_frontend_next:
